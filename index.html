<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>FiscalOPS — Painel Fiscal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1117;--s1:#161B22;--s2:#21262D;--s3:#30363D;
  --tx:#E6EDF3;--mu:#8B949E;--ac:#58A6FF;
  --go:#3B82F6;--ops:#9333EA;--g3:#EF4444;--sc:#D4AF37;
  --done:#10B981;--pend:#EF4444;--prog:#6B7280;--and_:#3B82F6;
}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}
.hdr{background:var(--s1);border-bottom:1px solid var(--s3);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;color:var(--ac);letter-spacing:-.5px}
.logo em{color:var(--mu);font-style:normal;font-weight:400}
.sw{position:relative;flex:1;min-width:140px;max-width:200px}
.sw input{width:100%;background:var(--s2);border:1px solid var(--s3);border-radius:6px;padding:5px 8px 5px 26px;color:var(--tx);font-size:12px;outline:none}
.sw input:focus{border-color:var(--ac)}
.sw::before{content:"🔍";position:absolute;left:7px;top:50%;transform:translateY(-50%);font-size:11px}
select{background:var(--s2);border:1px solid var(--s3);border-radius:6px;padding:5px 8px;color:var(--tx);font-size:11px;outline:none;cursor:pointer;max-width:120px}
input[type=text],input[type=email]{background:var(--s2);border:1px solid var(--s3);border-radius:6px;padding:6px 9px;color:var(--tx);font-size:12px;outline:none}
input:focus,select:focus{border-color:var(--ac)}
.btn{background:var(--s2);border:1px solid var(--s3);border-radius:6px;padding:5px 11px;color:var(--tx);font-size:11px;cursor:pointer;white-space:nowrap;transition:.15s}
.btn:hover{background:var(--s3)}
.btn-primary{background:var(--ac);border-color:var(--ac);color:#fff}
.btn-primary:hover{opacity:.88}
.btn-danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#F87171}
.btn-danger:hover{background:rgba(239,68,68,.22)}
.btn-warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#FCD34D}
.btn-warn:hover{background:rgba(245,158,11,.22)}
.mnav{display:flex;align-items:center;gap:5px;margin-left:auto}
.mnav button{background:var(--s2);border:1px solid var(--s3);border-radius:5px;width:24px;height:24px;color:var(--tx);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.mlbl{font-size:12px;font-weight:600;min-width:108px;text-align:center}
.tabs{background:var(--s1);border-bottom:1px solid var(--s3);padding:0 16px;display:flex;overflow-x:auto;gap:0}
.tabs::-webkit-scrollbar{height:0}
.tab{padding:9px 13px;font-size:12px;font-weight:500;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.1s;flex-shrink:0}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.tab:hover:not(.on){color:var(--tx)}
.badge{background:var(--ac);color:#fff;font-size:8px;padding:1px 5px;border-radius:8px;margin-left:4px;vertical-align:middle}
/* KPI */
.krow{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:12px 16px}
.kpi{background:var(--s1);border:1px solid var(--s3);border-radius:8px;padding:10px 12px}
.kl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kv{font-size:22px;font-weight:700;line-height:1}
.ks{font-size:10px;color:var(--mu);margin-top:3px}
/* OVERVIEW */
.ov{padding:12px 16px}
.rg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.rc{background:var(--s1);border:1px solid var(--s3);border-radius:8px;padding:14px;position:relative;overflow:hidden}
.rc::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.rl::before{background:#10B981}.rm::before{background:#8B5CF6}.rma::before{background:var(--ac)}.rv::before{background:#F59E0B}
.rn{font-size:12px;font-weight:700;margin-bottom:4px}
.rcargo{font-size:9px;color:var(--mu);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.cargo-tag{background:var(--s2);border:1px solid var(--s3);border-radius:3px;padding:1px 5px;font-size:9px}
.rt{font-size:26px;font-weight:700;color:var(--ac)}
.rs{font-size:10px;color:var(--mu);margin-top:2px}
.rtags{display:flex;gap:4px;flex-wrap:wrap;margin-top:9px}
.rtag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500}
.tgo{background:rgba(59,130,246,.2);color:#60A5FA}.tops{background:rgba(147,51,234,.2);color:#C084FC}
.tg3{background:rgba(239,68,68,.2);color:#F87171}.tsc{background:rgba(212,175,55,.15);color:#D4AF37;border:1px solid rgba(212,175,55,.2)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cc{background:var(--s1);border:1px solid var(--s3);border-radius:8px;padding:13px}
.ch{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.br{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bl{font-size:10px;color:var(--mu);width:82px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bt{flex:1;background:var(--s2);border-radius:3px;height:8px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:.6s}
.bv{font-size:10px;font-weight:700;min-width:22px;text-align:right}
/* TABLE */
.tw{padding:0 16px 16px}
.tf{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.to{border:1px solid var(--s3);border-radius:8px;overflow:hidden}
.ts{max-height:440px;overflow-y:auto}
.ts::-webkit-scrollbar{width:4px}
.ts::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
table{width:100%;border-collapse:collapse;min-width:680px}
th{background:var(--s2);font-size:10px;font-weight:600;color:var(--mu);text-align:left;padding:7px 10px;position:sticky;top:0;z-index:5;border-bottom:1px solid var(--s3);cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--tx)}
th.ns{cursor:default}th.ns:hover{color:var(--mu)}
td{padding:6px 10px;border-bottom:1px solid var(--s2);vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:rgba(255,255,255,.015)}
.cn2{font-size:12px;font-weight:500;max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cnpj{font-size:10px;color:var(--mu);font-family:"SF Mono",Consolas,monospace}
.gb,.rb,.sb{font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap}
.gb{font-weight:600}
.bgo{background:rgba(59,130,246,.2);color:#60A5FA}.bops{background:rgba(147,51,234,.2);color:#C084FC}
.bg3{background:rgba(239,68,68,.2);color:#F87171}.bsc{background:rgba(212,175,55,.15);color:#D4AF37;border:1px solid rgba(212,175,55,.25)}
.bsn{background:rgba(16,185,129,.15);color:#34D399}.blr{background:rgba(99,102,241,.15);color:#818CF8}
.blp{background:rgba(245,158,11,.15);color:#FCD34D}.bmei{background:rgba(236,72,153,.15);color:#F9A8D4}.bis{background:rgba(107,114,128,.15);color:var(--mu)}
.bnilr{background:rgba(107,114,128,.1);color:var(--mu)}
.sb.sp{background:rgba(107,114,128,.2);color:var(--mu)}.sb.sa{background:rgba(59,130,246,.2);color:#60A5FA}
.sb.spe{background:rgba(239,68,68,.2);color:#F87171}.sb.sd{background:rgba(16,185,129,.2);color:#34D399}
.ds{background:var(--s2);border:1px solid var(--s3);border-radius:5px;padding:3px 6px;color:var(--tx);font-size:10px;outline:none;max-width:98px}
.ds:focus{border-color:var(--ac)}.ds.ok{border-color:var(--go);color:var(--go)}
.resp-sel{background:transparent;border:1px solid transparent;border-radius:5px;padding:2px 5px;color:var(--tx);font-size:11px;outline:none;cursor:pointer;max-width:110px;transition:.15s}
.resp-sel:hover{border-color:var(--s3);background:var(--s2)}
.resp-sel:focus{border-color:var(--ac);background:var(--s2)}
.resp-sel.mar{color:var(--ac);font-weight:600}
/* GESTÃO */
.gw{padding:12px 16px 16px}
.gtabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--s3);padding-bottom:0}
.gtab{padding:7px 12px;font-size:11px;font-weight:500;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.1s}
.gtab.on{color:var(--ac);border-bottom-color:var(--ac)}
.gtab:hover:not(.on){color:var(--tx)}
/* PRODUTIVIDADE */
.prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.prod-card{background:var(--s1);border:1px solid var(--s3);border-radius:8px;padding:13px;position:relative;overflow:hidden}
.prod-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px}
.pc-l::before{background:#10B981}.pc-m::before{background:#8B5CF6}.pc-mar::before{background:var(--ac)}.pc-v::before{background:#F59E0B}
.pc-name{font-size:11px;font-weight:700;margin-bottom:2px}
.pc-cargo{font-size:9px;color:var(--mu);margin-bottom:10px}
.pc-sla{font-size:28px;font-weight:700;line-height:1;margin-bottom:2px}
.pc-sla-lbl{font-size:9px;color:var(--mu)}
.pc-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:10px}
.pc-stat{background:var(--s2);border-radius:5px;padding:5px 7px;text-align:center}
.pc-stat-v{font-size:14px;font-weight:700}
.pc-stat-l{font-size:8px;color:var(--mu);margin-top:1px}
.pc-bar-wrap{margin-top:10px}
.pc-bar-lbl{font-size:9px;color:var(--mu);display:flex;justify-content:space-between;margin-bottom:3px}
.pc-bar-track{background:var(--s2);border-radius:4px;height:6px;overflow:hidden}
.pc-bar-fill{height:100%;border-radius:4px;transition:.6s}
/* Ranking */
.rank-table{width:100%;margin-bottom:12px}
.rank-row{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--s3);border-radius:7px;padding:10px 13px;margin-bottom:6px}
.rank-pos{font-size:16px;font-weight:800;width:24px;text-align:center;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:12px;font-weight:600}
.rank-cargo{font-size:9px;color:var(--mu);margin-top:1px}
.rank-bars{flex:2}
.rank-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.rank-bar-lbl{font-size:9px;color:var(--mu);width:65px;white-space:nowrap}
.rank-bar-t{flex:1;background:var(--s2);border-radius:3px;height:7px;overflow:hidden}
.rank-bar-f{height:100%;border-radius:3px;transition:.6s}
.rank-nums{display:flex;gap:8px;flex-shrink:0}
.rank-num{text-align:center}
.rank-num-v{font-size:12px;font-weight:700}
.rank-num-l{font-size:8px;color:var(--mu)}
.rank-medal{font-size:18px;margin-left:4px;flex-shrink:0}
/* Histórico mensal */
.hist-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}
.hist-cell{background:var(--s1);border:1px solid var(--s3);border-radius:6px;padding:8px;text-align:center}
.hist-month{font-size:9px;color:var(--mu);margin-bottom:5px}
.hist-sla{font-size:16px;font-weight:700}
.hist-bar{margin-top:4px;height:32px;display:flex;flex-direction:column;justify-content:flex-end}
.hist-fill{border-radius:2px 2px 0 0;transition:.6s;min-height:2px}
/* COLABORADORES */
.colabs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.colab-card{background:var(--s1);border:1px solid var(--s3);border-radius:8px;padding:14px;position:relative}
.colab-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;border-radius:8px 8px 0 0}
.colab-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin-bottom:10px}
.colab-name{font-size:13px;font-weight:700;margin-bottom:3px}
.colab-cargo{font-size:10px;color:var(--mu);margin-bottom:8px}
.colab-stats{display:flex;gap:6px;font-size:9px;flex-wrap:wrap}
.colab-stat{background:var(--s2);border-radius:3px;padding:2px 7px;color:var(--mu)}
.colab-actions{display:flex;gap:5px;margin-top:10px}
.add-colab-card{background:var(--s1);border:1px dashed var(--s3);border-radius:8px;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;min-height:140px;transition:.15s;color:var(--mu)}
.add-colab-card:hover{border-color:var(--ac);color:var(--ac);background:rgba(88,166,255,.04)}
.add-colab-icon{font-size:24px;margin-bottom:6px}
.add-colab-lbl{font-size:11px;font-weight:500}
/* CAL */
.cw{padding:0 16px 16px}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dh{text-align:center;font-size:9px;font-weight:600;color:var(--mu);padding:4px 0;text-transform:uppercase}
.dc{background:var(--s1);border:1px solid var(--s3);border-radius:6px;padding:5px;min-height:65px;cursor:pointer;transition:.1s;overflow:hidden}
.dc:hover{border-color:var(--ac)}.dc.sel{border-color:var(--ac);background:rgba(88,166,255,.1)}
.dc.tod{border-color:var(--go)}.dc.emp{background:transparent;border-color:transparent;cursor:default}.dc.we{opacity:.55;cursor:default;background:var(--s2)}
.dn{font-size:10px;font-weight:700;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.dch{display:flex;flex-wrap:wrap;gap:1px;margin-bottom:2px}
.chip{font-size:8px;padding:1px 3px;border-radius:2px;font-weight:700}
.cgo2{background:rgba(59,130,246,.3);color:#93C5FD}.cops2{background:rgba(147,51,234,.3);color:#D8B4FE}

.card{background:var(--s2);border:1px solid var(--s3);border-radius:6px;padding:8px;margin-bottom:6px;cursor:grab;position:relative;overflow:hidden;transition:.1s}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px}

.card.cpe{border-color:rgba(239,68,68,.4)}.card.cdo{border-color:rgba(16,185,129,.4)}.card.iscsc{border-color:rgba(212,175,55,.45);background:rgba(212,175,55,.04)}
.cname{font-size:11px;font-weight:600;margin-left:6px;margin-bottom:5px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cmeta{display:flex;gap:4px;margin-left:6px;flex-wrap:wrap;align-items:center}
.scstar{position:absolute;top:4px;right:5px;font-size:8px;background:var(--sc);color:#1a1a1a;padding:1px 4px;border-radius:2px;font-weight:700}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:20px;width:400px;max-width:95vw}

.modal h3{font-size:14px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:11px;color:var(--mu);margin-bottom:14px;border-bottom:1px solid var(--s3);padding-bottom:10px}
.mf{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.mf label{font-size:10px;color:var(--mu);font-weight:500}
.mf input,.mf select,.mf textarea{background:var(--s2);border:1px solid var(--s3);border-radius:6px;padding:7px 9px;color:var(--tx);font-size:12px;outline:none;width:100%;font-family:inherit}
.mf input:focus,.mf select:focus{border-color:var(--ac)}
.mf input.err{border-color:var(--pend)}
.mf .errtxt{font-size:9px;color:var(--pend);margin-top:2px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.mbtns button{padding:7px 16px;border-radius:6px;font-size:12px;cursor:pointer;border:none;font-weight:500}
.mc{background:var(--s2);color:var(--tx)}.mok{background:var(--ac);color:#fff}.mdel{background:var(--pend);color:#fff}

.notif{position:fixed;top:68px;right:16px;border-radius:8px;padding:10px 14px;font-size:12px;z-index:400;max-width:260px;background:var(--s1);border:1px solid;animation:slin .25s}

  companies: INIT_DATA.map(([id,cnpj,name,grp,reg,resp])=>({id,cnpj,name,grp,reg,resp,ativo:true})),
  getResps(){return this.colaboradores.filter(c=>c.ativo).map(c=>c.nome);},
  addColab(c){const nc={...c,id:nextColabId(),ativo:true};this.colaboradores.push(nc);return nc;},
  updateColab(id,fields){const i=this.colaboradores.findIndex(x=>x.id===id);if(i>=0)Object.assign(this.colaboradores[i],fields);return this.colaboradores[i];},
  removeColab(id){
    // Reassign companies before removing
    const colab=this.colaboradores.find(x=>x.id===id);
    if(colab){

      if(fallback)this.companies.filter(c=>c.resp===colab.nome).forEach(c=>c.resp=fallback.nome);
    }
    const i=this.colaboradores.findIndex(x=>x.id===id);if(i>=0)this.colaboradores.splice(i,1);
  },
  addCompany(c){const nc={...c,id:nextId(),ativo:true};this.companies.push(nc);return nc;},
  updateCompany(id,fields){const i=this.companies.findIndex(x=>x.id===id);if(i>=0)Object.assign(this.companies[i],fields);return this.companies[i];},
  removeCompany(id){const i=this.companies.findIndex(x=>x.id===id);if(i>=0)this.companies.splice(i,1);},
  changeResp(id,resp){return this.updateCompany(id,{resp});},
};

/* Produtividade simulada por mês */
function getProdData(resp,y,m){
  const k=mKey(y,m);
  const companies=DB.companies.filter(c=>c.resp===resp&&c.ativo);
  const total=companies.length;
  const asgn=S.assignments[k]||{};
  const sts=S.statuses[k]||{};
  const agendados=companies.filter(c=>asgn[c.id]).length;
  const concluidos=companies.filter(c=>sts[c.id]==='Concluído').length;
  const pendencias=companies.filter(c=>sts[c.id]==='Pendência').length;
  const andamento=companies.filter(c=>sts[c.id]==='Em Andamento').length;
  const sla=agendados>0?Math.round(concluidos/agendados*100):0;
  return{total,agendados,concluidos,pendencias,andamento,sla};
}

  const k=curKey();

    if(!S.statuses[k])S.statuses[k]={};

/* ── FILTER/SORT ── */
function filtered(){
  const{search,resp,grp,reg,nodate}=S.filter;
  return DB.companies.filter(c=>{
    if(!c.ativo)return false;
    if(resp&&c.resp!==resp)return false;
    if(grp&&c.grp!==grp)return false;
    if(reg&&c.reg!==reg)return false;
    if(search){const q=search.toLowerCase();if(!c.name.toLowerCase().includes(q)&&!c.cnpj.includes(q))return false;}
    if(nodate&&getAsgn(c.id))return false;
    return true;
  }).sort((a,b)=>{
    const col=S.sort.col;
    let av=col==='resp'?a.resp:col==='grp'?a.grp:col==='date'?(getAsgn(a.id)||999):a.name;
    let bv=col==='resp'?b.resp:col==='grp'?b.grp:col==='date'?(getAsgn(b.id)||999):b.name;
    return av<bv?-S.sort.dir:av>bv?S.sort.dir:0;
  });
}
function toggleSort(col){if(S.sort.col===col)S.sort.dir*=-1;else{S.sort.col=col;S.sort.dir=1;}render();}

function renderCalendar(){
  const{y,m}=S.vm;
  const first=firstDow(y,m);const total=daysInMonth(y,m);
  const cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=total;d++)cells.push(d);
  const isCM=(y===TODAY.y&&m===TODAY.m);
  return`<div class="cw"><div class="cg">
    ${DAYS.map(d=>`<div class="dh">${d}</div>`).join('')}
    ${cells.map(day=>{
      if(!day)return'<div class="dc emp"></div>';
      const we=isWE(y,m,day);const isT=isCM&&day===TODAY.d;const isSel=day===S.selDay;
      const comps=dayComps(day);const tot=comps.length;
      const done=comps.filter(c=>getSt(c.id)==='Concluído').length;
      const pend=comps.filter(c=>getSt(c.id)==='Pendência').length;
      const anda=comps.filter(c=>getSt(c.id)==='Em Andamento').length;
      const prog=comps.filter(c=>getSt(c.id)==='Programado').length;
      const goC=comps.filter(c=>c.grp==='GO').length;const opsC=comps.filter(c=>c.grp==='OPS').length;
      const g3C=comps.filter(c=>c.grp==='G3').length;const scC=comps.filter(c=>c.grp==='SC').length;
      return`<div class="dc${isSel?' sel':''}${isT?' tod':''}${we?' we':''}" onclick="${we?'':'selDay('+day+')'}">
        <div class="dn"><span>${day}</span>${isT?'<span style="width:5px;height:5px;border-radius:50%;background:var(--go);display:inline-block"></span>':''}${we?'<span style="font-size:8px;color:var(--mu)">FDS</span>':''}</div>
        ${!we&&tot>0?`<div class="dch">
          ${goC?`<span class="chip cgo2">${goC}GO</span>`:''}${opsC?`<span class="chip cops2">${opsC}OP</span>`:''}
          ${g3C?`<span class="chip cg32">${g3C}G3</span>`:''}${scC?`<span class="chip csc2">${scC}SC</span>`:''}
        </div><div class="dsb">
          ${done?`<div class="dd" style="flex:${done}"></div>`:''}${anda?`<div class="da" style="flex:${anda}"></div>`:''}
          ${pend?`<div class="dp" style="flex:${pend}"></div>`:''}${prog?`<div class="dr" style="flex:${prog}"></div>`:''}
        </div>`:'<div style="font-size:8px;color:var(--mu);opacity:.3;text-align:center;padding-top:8px">—</div>'}
      </div>`;
    }).join('')}
  </div></div>`;
}

  if(t==='addColab'||t==='editColab'){
    const isEdit=t==='editColab';const f=S.form;const e=S.formErr;
    const colab=isEdit?DB.colaboradores.find(x=>x.id===S.modal.data.id):null;
    return`<div class="mbg" onclick="if(event.target===this){S.modal=null;render();}">
      <div class="modal">
        <h3>${isEdit?'✎ Editar Colaborador':'+ Novo Colaborador'}</h3>
        <div class="modal-sub">${isEdit?'Altere nome ou cargo do colaborador':'Preencha as informações básicas'}</div>
        <div class="mf">
          <label>Nome completo *</label>
          <input type="text" value="${f.nome||''}" oninput="S.form.nome=this.value;S.formErr.nome='';render()" placeholder="Ex: Ana Paula Silva" class="${e.nome?'err':''}">
          ${e.nome?`<span class="errtxt">${e.nome}</span>`:''}
        </div>
        <div class="mf">
          <label>Cargo</label>
          <select onchange="S.form.cargo=this.value">
            ${CARGOS.map(c=>`<option value="${c}"${f.cargo===c?' selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="mf">
          <label>Cor de identificação</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
            ${COLAB_COLORS.map(cor=>`<div onclick="S.form.cor='${cor}';render()" style="width:28px;height:28px;border-radius:50%;background:${cor};cursor:pointer;border:3px solid ${f.cor===cor?'#fff':'transparent'};transition:.15s" title="${cor}"></div>`).join('')}
          </div>
        </div>
        ${isEdit&&colab?`<div style="background:var(--s2);border-radius:6px;padding:8px 10px;font-size:10px;color:var(--mu);margin-bottom:4px">
          ⚠️ Se alterar o nome, as empresas atribuídas a <strong>${colab.nome}</strong> serão automaticamente atualizadas para o novo nome.
        </div>`:''}
        <div class="mbtns">
          <button class="mc" onclick="S.modal=null;render()">Cancelar</button>
          <button class="mok" onclick="${isEdit?'confirmEditColab()':'confirmAddColab()'}">
            ${isEdit?'💾 Salvar':'✓ Adicionar'}
          </button>
        </div>
      </div></div>`;
  }

  if(t==='deleteColab'){
    const c=DB.colaboradores.find(x=>x.id===S.modal.data.id);
    const nEmpresas=DB.companies.filter(x=>x.resp===c?.nome&&x.ativo).length;
    const fallback=DB.colaboradores.find(x=>x.id!==S.modal.data.id&&x.ativo);
    return`<div class="mbg" onclick="if(event.target===this){S.modal=null;render();}">
      <div class="confirm-box">
        <h3>⚠️ Remover colaborador</h3>
        <p>Tem certeza que deseja remover <strong>${c?.nome||''}</strong>?<br><br>
        ${nEmpresas>0?`As ${nEmpresas} empresa(s) atribuídas a ele(a) serão reatribuídas para <strong>${fallback?.nome||'outro colaborador'}</strong>.<br><br>`:''}
        Esta ação não pode ser desfeita.</p>
        <div class="mbtns">
          <button class="mc" onclick="S.modal=null;render()">Cancelar</button>
          <button class="mdel" onclick="confirmDeleteColab()">Confirmar Remoção</button>
        </div>
      </div></div>`;
  }
  return'';
}

/* ── MAIN RENDER ── */
function render(){
  const k=curKey();const assigned=Object.keys(S.assignments[k]||{}).length;
  const{y,m}=S.vm;const cl=S.dark?'':'lt';
  const active=DB.companies.filter(c=>c.ativo).length;
  const resps=DB.getResps();
  document.getElementById('root').innerHTML=`<div class="${cl}">
    <div class="hdr">
      <div class="logo">Fiscal<em>OPS</em></div>
      <div class="sw"><input type="text" placeholder="Buscar empresa..." value="${S.filter.search}" oninput="setFil('search',this.value)"></div>
      <select onchange="setFil('resp',this.value)"><option value="">Responsáveis</option>
        ${resps.map(r=>`<option value="${r}"${S.filter.resp===r?' selected':''}>${r.split(' ')[0]}</option>`).join('')}</select>
      <select onchange="setFil('grp',this.value)"><option value="">Grupos</option>
        ${Object.entries(GROUPS).map(([k2,v])=>`<option value="${k2}"${S.filter.grp===k2?' selected':''}>${k2==='SC'?'Scuderia':v}</option>`).join('')}</select>
      <div class="mnav">
        <button onclick="navM(-1)">‹</button>
        <div class="mlbl">${MONTHS[m-1]} ${y}</div>
        <button onclick="navM(1)">›</button>
      </div>
      <button class="btn" onclick="S.dark=!S.dark;render()">${S.dark?'☀️':'🌙'}</button>
    </div>
    <div class="tabs">
      <div class="tab${S.tab==='overview'?' on':''}" onclick="S.tab='overview';render()">👥 Visão Geral</div>
      <div class="tab${S.tab==='clients'?' on':''}" onclick="S.tab='clients';render()">📋 Clientes <span class="badge">${active}</span></div>
      <div class="tab${S.tab==='gestao'?' on':''}" onclick="S.tab='gestao';render()">⚙️ Gestão</div>
      <div class="tab${S.tab==='calendar'?' on':''}" onclick="S.tab='calendar';render()">📅 Calendário <span class="badge">${assigned}</span></div>
      <div class="tab${S.tab==='kanban'?' on':''}" onclick="S.tab='kanban';render()">⬛ Kanban</div>
    </div>
    ${renderKPI()}
    ${S.tab==='overview'?renderOverview():''}
    ${S.tab==='clients'?renderClients():''}
    ${S.tab==='gestao'?renderGestao():''}
    ${S.tab==='calendar'?renderCalendar():''}
    ${S.tab==='kanban'?renderKanban():''}
    ${renderModal()}
    ${S.notif?`<div class="notif ${S.notif.type}">${S.notif.msg}</div>`:''}
  </div>`;
}

window.setFil=(k,v)=>{S.filter={...S.filter,[k]:v};render();};
window.toggleSort=toggleSort;
window.navM=dir=>{let{y,m}=S.vm;m+=dir;if(m>12){m=1;y++;}if(m<1){m=12;y--;}S.vm={y,m};render();};
window.doAsgn=(id,val)=>{setAsgn(id,val?parseInt(val):null);render();};
window.selDay=d=>{S.selDay=d;S.tab='kanban';render();};
window.changeResp=changeResp;
window.openAdd=openAdd;window.openEdit=openEdit;window.openDelete=openDelete;
window.confirmAdd=confirmAdd;window.confirmEdit=confirmEdit;window.confirmDelete=confirmDelete;
window.openAddColab=openAddColab;window.openEditColab=openEditColab;window.openDeleteColab=openDeleteColab;
window.confirmAddColab=confirmAddColab;window.confirmEditColab=confirmEditColab;window.confirmDeleteColab=confirmDeleteColab;
window.cpend=()=>{
  const r=document.getElementById('prtxt')?.value||'';
  if(!r.trim()){alert('Informe o motivo');return;}
  doMove(S.modal.data.id,'Pendência');
};

render();
</script>
</body>
</html>
